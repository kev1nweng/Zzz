name: Zzz
options:
  bundleIdPrefix: space.kev1nweng
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Zzz
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  Zzz:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes: 
          - Widget/**
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: space.kev1nweng.zzz
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LSUIElement: YES
        CODE_SIGN_ENTITLEMENTS: Resources/Zzz.entitlements
    dependencies:
      - target: ZzzWidget
        embed: true

  ZzzWidget:
    type: app-extension
    platform: macOS
    sources: 
      - path: Sources/Widget
      - path: Sources/BedtimeManager.swift
    settings:
      base:
        PRODUCT_NAME: ZzzWidgetExtension
        PRODUCT_BUNDLE_IDENTIFIER: space.kev1nweng.zzz.widget
        INFOPLIST_FILE: Resources/Widget-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Zzz.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
    dependencies: []

schemes:
  Zzz:
    build:
      targets:
        Zzz: [run, test, profile, analyze]
    run:
      target: Zzz
  ZzzWidget:
    build:
      targets:
        ZzzWidget: [run]
    run:
      target: ZzzWidget
