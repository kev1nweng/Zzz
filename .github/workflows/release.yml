name: Build and Pre-release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'README.en.md'
      - '.gitignore'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Application
        run: |
          xcodebuild -project Zzz.xcodeproj \
                     -scheme Zzz \
                     -configuration Release \
                     -derivedDataPath ./build_data \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=YES

      - name: Prepare DMG
        run: |
          mkdir -p dmg_root
          # Copy the app to the dmg root
          cp -R ./build_data/Build/Products/Release/Zzz.app dmg_root/
          # Create Applications symlink
          ln -s /Applications dmg_root/Applications
          # Create the DMG
          hdiutil create -volname "Zzz" -srcfolder dmg_root -ov -format UDZO Zzz.dmg

      - name: Parse Release Version
        id: release_check
        run: |
          MSG=$(git log -1 --format=%B)
          if [[ $MSG =~ \[release\]\ v?([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "tag=v${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "tag=pre-release-$(date +'%Y%m%d%H%M%S')-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "version=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_check.outputs.tag }}
          name: ${{ steps.release_check.outputs.is_release == 'true' && format('Release {0}', steps.release_check.outputs.version) || format('Pre-release {0}', steps.release_check.outputs.version) }}
          body: |
            Automated ${{ steps.release_check.outputs.is_release == 'true' && 'formal release' || 'pre-release' }} for commit ${{ github.sha }}.
            
            Changes:
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: ${{ steps.release_check.outputs.is_release != 'true' }}
          files: Zzz.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
